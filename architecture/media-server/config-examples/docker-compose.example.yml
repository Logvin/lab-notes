# docker-compose.example.yml
#
# Full media server stack. Adapt paths, UIDs, and domain names to your setup.
#
# Key conventions:
#   - All containers bind to 127.0.0.1 (except SWAG and Plex)
#   - PUID/PGID match your media service user
#   - MergerFS mount is shared into containers that need media access
#   - Config volumes are on local storage for persistence

version: "3.8"

services:
  # ============================================================
  # REVERSE PROXY
  # ============================================================
  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - URL=media.example.com
      - VALIDATION=dns
      - DNSPLUGIN=cloudflare
      - ONLY_SUBDOMAINS=false
    volumes:
      - /local/storage/swag_config:/config
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  # ============================================================
  # MEDIA SERVER
  # ============================================================
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - VERSION=docker
    volumes:
      - /local/storage/plex_config:/config
      - /local/storage/plexdrive:/media:shared  # MergerFS union mount
    restart: unless-stopped

  # ============================================================
  # ARR STACK
  # ============================================================
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - /local/storage/sonarr_config:/config
      - /local/storage/plexdrive:/media:shared
      - /local/storage/staging:/staging
      - /local/storage/mounts/local:/local-media
    ports:
      - "127.0.0.1:8989:8989"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - /local/storage/radarr_config:/config
      - /local/storage/plexdrive:/media:shared
      - /local/storage/staging:/staging
      - /local/storage/mounts/local:/local-media
    ports:
      - "127.0.0.1:7878:7878"
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - /local/storage/prowlarr_config:/config
    ports:
      - "127.0.0.1:9696:9696"
    restart: unless-stopped

  overseerr:
    image: sctx/overseerr:latest
    container_name: overseerr
    environment:
      - TZ=UTC
    volumes:
      - /local/storage/overseerr_config:/app/config
    ports:
      - "127.0.0.1:5055:5055"
    restart: unless-stopped

  # ============================================================
  # ANALYTICS
  # ============================================================
  tautulli:
    image: ghcr.io/tautulli/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - /local/storage/tautulli_config:/config
    ports:
      - "127.0.0.1:8181:8181"
    restart: unless-stopped

  # ============================================================
  # MONITORING
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - /local/storage/prometheus_config:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SERVER_ROOT_URL=https://media.example.com/apps/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_PASSWORD=CHANGE_ME
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - /local/storage/alertmanager_config:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - "127.0.0.1:9093:9093"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "127.0.0.1:9100:9100"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  # ============================================================
  # MANAGEMENT
  # ============================================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "127.0.0.1:9443:9443"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  portainer_data:
